<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 1 Task 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Menu -->
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Heading and Paragraph -->
    <section class="content">
        <h1>Welcome to My Web Page</h1>

        <p>
            This webpage is created using HTML and CSS as part of
            Level 1 Task 1. It includes a heading, paragraph,
            image, navigation menu and a simple form.
        </p>

        <img src="image.jpg"
             alt="Sample Image">
    </section>

    <!-- Form -->
    <section>
        <h2>Contact Form</h2>

        <form>
            <input
                type="text"
                placeholder="Enter your name"
                required>

            <button type="submit">
                Submit
            </button>
        </form>
    </section>

</body>
</html>
